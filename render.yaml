services:
  - type: web
    name: qitus-web
    runtime: node
    plan: free
    region: frankfurt
    repo: https://github.com/RPlecor/Qitus.git
    branch: main
    autoDeployTrigger: commit
    buildCommand: git submodule update --init --recursive && npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run seed && npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: staging
      - key: PUBLIC_APP_URL
        value: https://qitus-web.onrender.com
      - key: SESSION_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: qitus-db
          property: connectionString
      - key: AUTH_MODE
        value: clerk
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: BILLING_MODE
        value: stub
      - key: AI_PROVIDER
        value: fake
      - key: CHAT_PROVIDER
        value: fake
      - key: CHAT_MODEL
        value: gpt-5.4-mini
      - key: PAPERASSE_REPO_PATH
        value: ./vendor/paperasse
      - key: DOCUMENT_STORAGE_DIR
        value: /tmp/qitus/documents
      - key: EVIDENCE_STORAGE_DIR
        value: /tmp/qitus/evidence
      - key: OBJECT_STORAGE_MODE
        value: local
      - key: ENABLE_PDF_GENERATION
        value: "0"
      - key: IMPORT_EXECUTION_MODE
        value: inline
      - key: OBSERVABILITY_MODE
        value: local
      - key: CRON_MODE
        value: disabled
      - key: CONNECTORS_MODE
        value: disabled
      - key: OPEN_BANKING_PROVIDER
        value: disabled

databases:
  - name: qitus-db
    plan: free
    region: frankfurt
    databaseName: qitus
    user: qitus
    postgresMajorVersion: "16"

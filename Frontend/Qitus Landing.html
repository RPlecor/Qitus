  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

eu de 3 heures. Si vous n'en avez pas, le dossier reste exportable et vérifiable.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"audience fade-in\">\n        <p class=\"h-eyebrow\">Dirigeant TPE<\u002Fp>\n        <h4>Moins d'heures mécaniques. Plus de conseil.<\u002Fh4>\n        <p>Votre EC perd du temps en ressaisie. Qitus lui livre un dossier structuré qu'il valide directement. Vous payez de la valeur, pas du copier-coller.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"exclusion fade-in\">\n      <h5>Qitus n'est pas fait pour<\u002Fh5>\n      <ul>\n        <li>\n          <svg class=\"x\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M5 12h14\"><\u002Fpath><\u002Fsvg>\n          Les grandes entreprises multi-entités.\n        <\u002Fli>\n        <li>\n          <svg class=\"x\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M5 12h14\"><\u002Fpath><\u002Fsvg>\n          Ceux qui veulent se passer entièrement d'expert-comptable.\n        <\u002Fli>\n        <li>\n          <svg class=\"x\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M5 12h14\"><\u002Fpath><\u002Fsvg>\n          Les cabinets comptables (offre dédiée bientôt).\n        <\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ────────────── PRICING ────────────── -->\n<section class=\"bg-white section-pad\" id=\"pricing\">\n  <div class=\"wrap\">\n    <div class=\"section-head fade-in\">\n      <p class=\"h-eyebrow\">Pricing<\u002Fp>\n      <h2 class=\"display\">Un prix juste,<br>rendu possible <em>par l'architecture.<\u002Fem><\u002Fh2>\n      <p class=\"lede\" style=\"margin: 24px auto 0;\">La plupart des outils comptables facturent cher parce que chaque transaction passe par de l'IA coûteuse. Chez Qitus, <strong>la majorité du traitement passe par des règles<\u002Fstrong> — pas par des appels API à 0,03 € pièce.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"price-grid\">\n      <div class=\"price-card fade-in\">\n        <h4>Solo<\u002Fh4>\n        <p class=\"target\">Freelance, micro-entreprise<\u002Fp>\n        <p class=\"price-amount\">9,90<span class=\"currency\">€<\u002Fspan><span class=\"per\">/mois<\u002Fspan><\u002Fp>\n        <a href=\"#cta-final\" class=\"btn btn-ghost btn-block price-cta\">Rejoindre la liste<\u002Fa>\n        <ul class=\"price-features\">\n          <li><svg class=\"check\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 7\"><\u002Fpath><\u002Fsvg>Jusqu'à 200 transactions/mois<\u002Fli>\n          <li><svg class=\"check\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 7\"><\u002Fpath><\u002Fsvg>Règles + IA ciblée + FEC<\u002Fli>\n          <li><svg class=\"check\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 7\"><\u002Fpath><\u002Fsvg>Lien EC en lecture<\u002Fli>\n          <li><svg class=\"check\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 7\"><\u002Fpath><\u002Fsvg>Sans engagement<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"price-card featured fade-in\">\n        <span class=\"price-badge\">Recommandé<\u002Fspan>\n        <h4>Pro<\u002Fh4>\n        <p class=\"target\">TPE 1–5 salariés, régime réel<\u002Fp>\n        <p class=\"price-amount\">24,90<span class=\"currency\">€<\u002Fspan><span class=\"per\">/mois<\u002Fspan><\u002Fp>\n        <a href=\"#cta-final\" class=\"btn btn-primary btn-block price-cta\">Rejoindre la liste<\u002Fa>\n        <ul class=\"price-features\">\n          <li><svg class=\"check\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 7\"><\u002Fpath><\u002Fsvg>Transactions illimitées<\u002Fli>\n          <li><svg class=\"check\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 7\"><\u002Fpath><\u002Fsvg>Bilan, CR, liasse fiscale<\u002Fli>\n          <li><svg class=\"check\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 7\"><\u002Fpath><\u002Fsvg>Validation collaborative EC<\u002Fli>\n          <li><svg class=\"check\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 7\"><\u002Fpath><\u002Fsvg>Support prioritaire<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div class=\"price-card fade-in\">\n        <h4>Cabinet<\u002Fh4>\n        <p class=\"target\">TPE 5–10 salariés, multi-exercices<\u002Fp>\n        <p class=\"price-amount\">39<span class=\"currency\">€<\u002Fspan><span class=\"per\">/mois<\u002Fspan><\u002Fp>\n        <a href=\"#cta-final\" class=\"btn btn-ghost btn-block price-cta\">Rejoindre la liste<\u002Fa>\n        <ul class=\"price-features\">\n          <li><svg class=\"check\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 7\"><\u002Fpath><\u002Fsvg>Multi-exercices, multi-comptes<\u002Fli>\n          <li><svg class=\"check\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 7\"><\u002Fpath><\u002Fsvg>Règles personnalisées<\u002Fli>\n          <li><svg class=\"check\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 7\"><\u002Fpath><\u002Fsvg>Audit trail complet<\u002Fli>\n          <li><svg class=\"check\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12l5 5L20 7\"><\u002Fpath><\u002Fsvg>SLA dédié<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p class=\"price-note fade-in\">Pas d'engagement annuel. Pas de frais cachés. Pricing beta — les premiers inscrits gardent leur tarif.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ────────────── FAQ ────────────── -->\n<section class=\"bg-sand section-pad-sm\" id=\"faq\">\n  <div class=\"wrap\">\n    <div class=\"section-head fade-in\">\n      <p class=\"h-eyebrow\">FAQ<\u002Fp>\n      <h2 class=\"display\">Questions <em>fréquentes.<\u002Fem><\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"faq fade-in\">\n      <details>\n        <summary>\n          Qitus remplace mon expert-comptable&nbsp;?\n          <svg class=\"plus\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n        <\u002Fsummary>\n        <div>Non. Qitus prépare. Votre EC valide. Celui qui prépare n'est pas celui qui signe — c'est le principe même qui rend le dossier fiable.<\u002Fdiv>\n      <\u002Fdetails>\n      <details>\n        <summary>\n          C'est fiable&nbsp;?\n          <svg class=\"plus\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n        <\u002Fsummary>\n        <div>La majorité du traitement passe par des règles — le même type de logique que votre EC applique manuellement, mais automatisé. L'IA ne touche que les cas ambigus, et chaque suggestion est tracée.<\u002Fdiv>\n      <\u002Fdetails>\n      <details>\n        <summary>\n          Quelle différence avec Indy ou Pennylane&nbsp;?\n          <svg class=\"plus\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n        <\u002Fsummary>\n        <div>Trois couches&nbsp;: règles pour le volume, IA pour les cas limites, EC pour la validation. Un dossier vérifiable de bout en bout, pas une boîte noire IA. Et significativement moins cher grâce à l'architecture rules-first.<\u002Fdiv>\n      <\u002Fdetails>\n      <details>\n        <summary>\n          Quelles banques&nbsp;?\n          <svg class=\"plus\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n        <\u002Fsummary>\n        <div>Au lancement&nbsp;: Qonto, BNP&nbsp;Paribas, Société&nbsp;Générale, Boursorama. Plus un import CSV générique qui fonctionne avec la plupart des banques françaises.<\u002Fdiv>\n      <\u002Fdetails>\n      <details>\n        <summary>\n          C'est prêt&nbsp;?\n          <svg class=\"plus\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n        <\u002Fsummary>\n        <div>Beta en préparation. Inscrivez-vous pour un accès prioritaire&nbsp;— les premiers inscrits gardent leur tarif beta après le lancement.<\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ────────────── CTA FINAL (dark) ────────────── -->\n<section class=\"bg-dark cta-final\" id=\"cta-final\">\n  <div class=\"cta-final-inner fade-in\">\n    <span class=\"pill\"><span class=\"dot\" aria-hidden=\"true\"><\u002Fspan>Beta — Accès anticipé<\u002Fspan>\n    <h2>Récupérez votre temps.<br><em>Qitus s'occupe du reste.<\u002Fem><\u002Fh2>\n\n    <form class=\"cta-form\" data-waitlist=\"\" novalidate=\"\" style=\"max-width: 460px; margin: 0 auto;\">\n      <div class=\"waitlist\" role=\"group\" aria-label=\"Inscription à la liste d'attente\">\n        <input type=\"email\" name=\"email\" placeholder=\"votre@email.com\" required=\"\" autocomplete=\"email\" aria-label=\"Adresse email\">\n        <button type=\"submit\" class=\"btn btn-primary\">Rejoindre la liste<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"waitlist-success\" role=\"status\" aria-live=\"polite\">\n        <span class=\"check\" aria-hidden=\"true\">\n          <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12l5 5L20 7\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fspan>\n        Vous êtes inscrit. On vous contacte bientôt.\n      <\u002Fdiv>\n      <p class=\"hero-form-note\">Gratuit. Sans engagement. Accès prioritaire.<\u002Fp>\n    <\u002Fform>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ────────────── FOOTER ────────────── -->\n<footer class=\"footer\">\n  <div class=\"wrap\">\n    <div>\n      <div class=\"brand\"><span class=\"q\">Q<\u002Fspan>itus<\u002Fdiv>\n      <p class=\"tag-line\">Comptabilité automatique pour freelances et TPE françaises.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"footer-links\">\n      <a href=\"#\">Mentions légales<\u002Fa>\n      <a href=\"mailto:contact@qitus.io\">Contact<\u002Fa>\n      <a href=\"#\">À propos<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n\n\n<script>\n  // Nav blur on scroll\n  (function () {\n    var nav = document.getElementById('nav');\n    function update() {\n      if (window.scrollY > 8) nav.classList.add('scrolled');\n      else nav.classList.remove('scrolled');\n    }\n    update();\n    window.addEventListener('scroll', update, { passive: true });\n  })();\n\n  // Waitlist form (no backend yet)\n  document.querySelectorAll('form[data-waitlist]').forEach(function (form) {\n    form.addEventListener('submit', function (e) {\n      e.preventDefault();\n      var input = form.querySelector('input[type=email]');\n      if (!input.value || !input.checkValidity()) {\n        input.focus();\n        input.reportValidity();\n        return;\n      }\n      form.classList.add('submitted');\n      // Sync the other form so user sees both done if they scroll\n      var allEmail = input.value;\n      document.querySelectorAll('form[data-waitlist]').forEach(function (f) {\n        var inp = f.querySelector('input[type=email]');\n        if (inp && !f.classList.contains('submitted')) {\n          inp.value = allEmail;\n          f.classList.add('submitted');\n        }\n      });\n    });\n  });\n\n  // Fade-in on scroll\n  (function () {\n    if (!('IntersectionObserver' in window)) {\n      document.querySelectorAll('.fade-in').forEach(function (el) { el.classList.add('in'); });\n      return;\n    }\n    var io = new IntersectionObserver(function (entries) {\n      entries.forEach(function (entry) {\n        if (entry.isIntersecting) {\n          entry.target.classList.add('in');\n          io.unobserve(entry.target);\n        }\n      });\n    }, { rootMargin: '0px 0px -10% 0px', threshold: 0.05 });\n    document.querySelectorAll('.fade-in').forEach(function (el) { io.observe(el); });\n  })();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paperasse
      POSTGRES_PASSWORD: paperasse
      POSTGRES_DB: paperasse
    ports:
      - "5432:5432"
    volumes:
      - paperasse-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  paperasse-postgres:
